name: oracle-selfcheck

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Oracle self-check (oracle PASSes dev+hidden; basic-only FAILs L2)
        run: bash scripts/selfcheck.sh
